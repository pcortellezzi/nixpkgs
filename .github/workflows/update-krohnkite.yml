name: Update krohnkite package

on:
  workflow_dispatch:
  schedule:
    - cron: '0 11 * * *'

jobs:
  update-krohnkite:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Run update script
        run: bash pkgs/krohnkite/update.sh

      - name: Commit changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          if ! git diff --quiet pkgs/krohnkite/default.nix; then
            NEW_VERSION=$(grep 'version =' pkgs/krohnkite/default.nix | head -1 | cut -d'"' -f2)
            git add pkgs/krohnkite/default.nix
            git commit -m "krohnkite: auto-update to $NEW_VERSION"
            git push
          else
            echo "krohnkite is already up to date."
          fi
