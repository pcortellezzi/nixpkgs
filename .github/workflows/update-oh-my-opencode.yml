name: Update oh-my-opencode package

on:
  workflow_dispatch:
  schedule:
    - cron: '0 11 * * *' # Runs every day at 11:00 AM

jobs:
  update-oh-my-opencode:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Update oh-my-opencode package
        run: |
          set -euo pipefail

          # Get current version
          CURRENT_VERSION=$(grep 'version = "' pkgs/oh-my-opencode/default.nix | head -1 | sed -E 's/.*version = "([^"]+)".*/\1/')
          echo "Current version: $CURRENT_VERSION"

          # Get latest version from npm registry
          echo "Fetching latest version from npm..."
          LATEST_VERSION=$(curl -s https://registry.npmjs.org/oh-my-opencode/latest | jq -r .version)

          if [ -z "$LATEST_VERSION" ] || [ "$LATEST_VERSION" == "null" ]; then
            echo "Error: Could not fetch latest version from npm."
            exit 1
          fi
          echo "Latest version: $LATEST_VERSION"

          if [ "$CURRENT_VERSION" == "$LATEST_VERSION" ]; then
            echo "oh-my-opencode is already up to date ($CURRENT_VERSION)."
            exit 0
          fi

          # Get new hash
          echo "Fetching new hash for version $LATEST_VERSION..."
          URL="https://registry.npmjs.org/oh-my-opencode-linux-x64/-/oh-my-opencode-linux-x64-${LATEST_VERSION}.tgz"
          NEW_HASH=$(nix hash convert --hash-algo sha256 --to sri $(nix-prefetch-url --type sha256 "$URL"))
          echo "New hash: $NEW_HASH"

          # Update file
          sed -i "s|version = \"$CURRENT_VERSION\"|version = \"$LATEST_VERSION\"|" pkgs/oh-my-opencode/default.nix
          sed -i "s|hash = \".*\"|hash = \"$NEW_HASH\"|" pkgs/oh-my-opencode/default.nix

          echo "Successfully updated oh-my-opencode to $LATEST_VERSION"

      - name: Build check
        run: |
          if git diff --quiet; then
            echo "No changes, skipping build check."
            exit 0
          fi
          echo "Testing build..."
          nix build .#oh-my-opencode

      - name: Commit changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          if ! git diff --quiet; then
            NEW_VERSION=$(grep 'version = "' pkgs/oh-my-opencode/default.nix | head -1 | sed -E 's/.*version = "([^"]+)".*/\1/')
            git add pkgs/oh-my-opencode/default.nix
            git commit -m "oh-my-opencode: Auto-update to $NEW_VERSION"
            git push
          else
            echo "No changes to commit."
          fi
